name: Deploy (FTP Amen)

on:
  push:
    branches: [main]
  workflow_dispatch:

# Évite deux déploiements concurrents.
concurrency:
  group: deploy-ftp
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Déploiement FTP (lftp)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -e "set cmd:fail-exit yes; set ftp:ssl-allow no; set ftp:passive-mode true; set ftp:use-pasv-ip false; set net:max-retries 2; set net:timeout 25; mirror -R --verbose --ignore-time ./dist/ '$FTP_REMOTE_DIR'; bye" -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER"
