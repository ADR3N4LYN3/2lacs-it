name: Deploy (FTP Amen)

on:
  push:
    branches: [main]
  workflow_dispatch:

# Évite deux déploiements concurrents.
concurrency:
  group: deploy-ftp
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # Secret Turnstile (chiffré dans GitHub) → /www/contact-secret.php, jamais commité.
      - name: Secret du formulaire (Turnstile)
        env:
          TS: ${{ secrets.TURNSTILE_SECRET }}
        run: |
          if [ -n "$TS" ]; then
            printf "<?php\ndefine('TURNSTILE_SECRET', '%s');\n" "$TS" > dist/contact-secret.php
            echo "contact-secret.php généré"
          else
            echo "TURNSTILE_SECRET absent — étape ignorée"
          fi

      - name: Déploiement FTP (lftp)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -e "set cmd:fail-exit yes; set ftp:ssl-allow no; set ftp:passive-mode on; set ftp:fix-pasv-address yes; set net:max-retries 2; set net:timeout 30; mirror -R --delete --verbose --ignore-time --exclude '\.well-known' ./dist/ '$FTP_REMOTE_DIR'; bye" -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER"
